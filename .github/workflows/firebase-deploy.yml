name: Deploy to Firebase Hosting

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Firebase CLI
        run: npm install -g firebase-tools
        
      - name: Create service account file
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' | base64 -d > service-account.json
          
      - name: Deploy to Firebase
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/service-account.json
        run: |
          firebase use --add arditi-dashboard-cg --token "$(cat service-account.json | jq -r '.token' 2>/dev/null || echo '')"
          firebase deploy --only hosting
