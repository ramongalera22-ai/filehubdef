<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FileHub - Gestor Médico</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container { max-width: 500px; width: 100%; }
        header {
            background: white;
            padding: 40px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }
        h1 { color: #667eea; margin-bottom: 10px; }
        .subtitle { color: #666; margin-bottom: 20px; }
        .content {
            background: white;
            padding: 30px 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #333; font-weight: 600; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        input:focus { outline: none; border-color: #667eea; }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            margin-top: 10px;
        }
        button:hover { opacity: 0.9; }
        .status { margin-top: 15px; padding: 10px; border-radius: 5px; text-align: center; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .docs { margin-top: 20px; padding: 15px; background: #f8f9ff; border-radius: 5px; }
        .docs h3 { color: #667eea; margin-bottom: 10px; }
        .docs ul { list-style: none; }
        .docs li { color: #666; margin: 5px 0; }
        footer { text-align: center; color: white; margin-top: 20px; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📁 FileHub</h1>
            <p class="subtitle">Gestor de Documentos Médicos</p>
        </header>
        
        <div class="content">
            <h2 style="color: #667eea; margin-bottom: 15px;">Autenticación</h2>
            
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" placeholder="tu@email.com">
            </div>
            
            <div class="form-group">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" placeholder="Al menos 6 caracteres">
            </div>
            
            <button onclick="signup()">Registrarse</button>
            <button onclick="login()" style="background: #999; margin-top: 5px;">Iniciar Sesión</button>
            <button onclick="logout()" style="background: #666; margin-top: 5px;">Cerrar Sesión</button>
            
            <div id="status"></div>
        </div>
        
        <div class="docs">
            <h3>🎯 Cómo usar:</h3>
            <ul>
                <li>✅ Registrate con tu email</li>
                <li>✅ Verifica tu email (Supabase envía enlace)</li>
                <li>✅ Inicia sesión</li>
                <li>✅ Crea documentos en la BD PostgreSQL</li>
            </ul>
        </div>
        
        <footer>
            FileHub | Documentos Médicos Organizados | Powered by Supabase & Netlify
        </footer>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script>
        const SUPABASE_URL = 'https://ztigttazrdzkpxrzyast.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp0aWd0dGF6cmR6a3B4cnp5YXN0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwMTg5MzcsImV4cCI6MjA4NzU5NDkzN30.d-PQ0S_dXsTRXGdRrZDJiJOXcXFF4hEOaAGWpT3WaSM';
        
        const { createClient } = window.supabase;
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
        
        function showStatus(msg, type) {
            const el = document.getElementById('status');
            el.textContent = msg;
            el.className = 'status ' + type;
        }
        
        async function signup() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            if (!email || !password) {
                showStatus('❌ Completa email y contraseña', 'error');
                return;
            }
            try {
                const { error } = await supabase.auth.signUp({ email, password });
                if (error) throw error;
                showStatus('✅ Registro exitoso. Verifica tu email.', 'success');
            } catch (err) {
                showStatus('❌ Error: ' + err.message, 'error');
            }
        }
        
        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            if (!email || !password) {
                showStatus('❌ Completa email y contraseña', 'error');
                return;
            }
            try {
                const { error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) throw error;
                showStatus('✅ ¡Sesión iniciada!', 'success');
            } catch (err) {
                showStatus('❌ Error: ' + err.message, 'error');
            }
        }
        
        async function logout() {
            try {
                const { error } = await supabase.auth.signOut();
                if (error) throw error;
                showStatus('✅ Sesión cerrada', 'success');
            } catch (err) {
                showStatus('❌ Error: ' + err.message, 'error');
            }
        }
    </script>
</body>
</html>
