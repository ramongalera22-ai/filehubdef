server {
    listen       80;
    server_name  filehub-casa.duckdns.org app-3005-dxp2800-8e1a-o128.eur11.ugdocker.link localhost;

    root   /usr/share/nginx/html;
    index  index.html index.htm;

    # ============================================
    # OPTIMIZACIÓN 15: COMPRESIÓN GZIP
    # Reduce transferencia ~60-70%
    # ============================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ============================================
    # OPTIMIZACIÓN 16: CACHE AGRESIVO POR TIPO
    # ============================================
    
    # Assets con hash (inmutables) - cache 1 año
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Service Worker - NUNCA cachear
    location = /sw.js {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # HTML - siempre validar
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache";
    }

    # Fuentes - cache largo
    location ~* \.(woff2?|ttf|eot|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Imágenes - cache largo
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires 6M;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
