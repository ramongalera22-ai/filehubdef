<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏥 Ofertas Médico de Familia - Barcelona</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
        .header { background: linear-gradient(135deg, #1e3a5f 0%, #0d9488 100%); padding: 2rem; text-align: center; }
        .header h1 { font-size: 1.8rem; margin-bottom: 0.5rem; }
        .header .subtitle { opacity: 0.85; font-size: 0.95rem; }
        .header .update-time { margin-top: 0.5rem; font-size: 0.8rem; opacity: 0.7; }
        .stats-bar { display: flex; justify-content: center; gap: 2rem; padding: 1rem 2rem; background: #1e293b; flex-wrap: wrap; }
        .stat { text-align: center; }
        .stat .num { font-size: 1.5rem; font-weight: 700; color: #2dd4bf; }
        .stat .label { font-size: 0.75rem; opacity: 0.6; text-transform: uppercase; }
        .context-box { max-width: 900px; margin: 1.5rem auto; padding: 1rem 1.5rem; background: #1e293b; border-left: 4px solid #2dd4bf; border-radius: 8px; }
        .context-box h3 { color: #2dd4bf; margin-bottom: 0.5rem; font-size: 0.95rem; }
        .context-box p { font-size: 0.85rem; line-height: 1.5; opacity: 0.85; }
        .trends { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.75rem; }
        .trend-tag { background: #0d9488; color: white; padding: 0.25rem 0.6rem; border-radius: 12px; font-size: 0.7rem; }
        .container { max-width: 900px; margin: 0 auto; padding: 1rem; }
        .oferta { background: #1e293b; border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; border: 1px solid #334155; transition: border-color 0.2s; }
        .oferta:hover { border-color: #2dd4bf; }
        .oferta-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem; flex-wrap: wrap; }
        .oferta-titulo { font-size: 1.05rem; font-weight: 600; color: #f1f5f9; }
        .oferta-badges { display: flex; gap: 0.4rem; flex-wrap: wrap; }
        .badge { padding: 0.2rem 0.5rem; border-radius: 6px; font-size: 0.7rem; font-weight: 600; }
        .badge-fuente { background: #312e81; color: #a5b4fc; }
        .badge-tipo { background: #064e3b; color: #6ee7b7; }
        .badge-estado { background: #7c2d12; color: #fdba74; }
        .oferta-body { margin-top: 0.75rem; }
        .oferta-desc { font-size: 0.85rem; line-height: 1.5; opacity: 0.8; }
        .oferta-meta { display: flex; gap: 1.5rem; margin-top: 0.75rem; flex-wrap: wrap; font-size: 0.8rem; opacity: 0.65; }
        .oferta-meta span::before { margin-right: 0.3rem; }
        .oferta-link { display: inline-block; margin-top: 0.75rem; color: #2dd4bf; text-decoration: none; font-size: 0.85rem; font-weight: 500; }
        .oferta-link:hover { text-decoration: underline; }
        .footer { text-align: center; padding: 2rem; opacity: 0.4; font-size: 0.75rem; }
        @media (max-width: 600px) {
            .header h1 { font-size: 1.3rem; }
            .stats-bar { gap: 1rem; }
            .container { padding: 0.75rem; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏥 Ofertas Médico de Familia — Barcelona</h1>
        <div class="subtitle">Dashboard de oportunidades laborales en Atención Primaria</div>
        <div class="update-time" id="update-time"></div>
    </div>
    <div class="stats-bar" id="stats-bar"></div>
    <div class="context-box" id="context-box"></div>
    <div class="container" id="ofertas-container"></div>
    <div class="footer">Actualización automática · Fuentes: CAMFIC, Gencat ICS, CatSalut, InfoJobs, Hospital Clínic, Teknon/Quirónsalud</div>

    <script>
        async function loadData() {
            try {
                const resp = await fetch('data-ofertas.json');
                const data = await resp.json();
                render(data);
            } catch(e) {
                document.getElementById('ofertas-container').innerHTML = '<p style="text-align:center;padding:2rem;opacity:0.5;">Error cargando datos. Reintenta más tarde.</p>';
            }
        }

        function render(data) {
            // Update time
            const d = new Date(data.meta.actualizado);
            document.getElementById('update-time').textContent = '📅 Última actualización: ' + d.toLocaleString('es-ES', { dateStyle: 'full', timeStyle: 'short' });

            // Stats
            const ofertas = data.ofertas;
            const activas = ofertas.filter(o => o.estado.toLowerCase().includes('activa')).length;
            const fuentes = data.meta.fuentes.length;
            document.getElementById('stats-bar').innerHTML = `
                <div class="stat"><div class="num">${ofertas.length}</div><div class="label">Ofertas</div></div>
                <div class="stat"><div class="num">${activas}</div><div class="label">Activas</div></div>
                <div class="stat"><div class="num">${fuentes}</div><div class="label">Fuentes</div></div>
            `;

            // Context
            const ctx = data.contexto;
            document.getElementById('context-box').innerHTML = `
                <h3>📊 Contexto del mercado</h3>
                <p>${ctx.mercado}</p>
                <div class="trends">${ctx.tendencias.map(t => `<span class="trend-tag">${t}</span>`).join('')}</div>
            `;

            // Ofertas
            const container = document.getElementById('ofertas-container');
            container.innerHTML = ofertas.map(o => `
                <div class="oferta">
                    <div class="oferta-header">
                        <div class="oferta-titulo">${o.titulo}</div>
                        <div class="oferta-badges">
                            <span class="badge badge-fuente">${o.fuente}</span>
                            <span class="badge badge-tipo">${o.tipo}</span>
                            <span class="badge badge-estado">${o.estado}</span>
                        </div>
                    </div>
                    <div class="oferta-body">
                        <div class="oferta-desc">${o.descripcion}</div>
                        <div class="oferta-meta">
                            <span>📍 ${o.ubicacion}</span>
                            <span>💰 ${o.salario}</span>
                            <span>📅 ${o.fecha}</span>
                        </div>
                        <a href="${o.url}" target="_blank" class="oferta-link">Ver oferta →</a>
                    </div>
                </div>
            `).join('');
        }

        loadData();
    </script>
</body>
</html>
