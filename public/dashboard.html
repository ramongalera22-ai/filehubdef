<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LifeBot Dashboard — Carlos Galera</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0b0e14;
  --surface: #131720;
  --card: #171c28;
  --card-h: #1c2233;
  --border: #232a3b;
  --border-a: #3a4460;
  --text: #e2e5ec;
  --text-s: #8891a5;
  --text-d: #545d73;
  --cyan: #22d3ee;
  --green: #34d399;
  --amber: #f59e0b;
  --red: #ef4444;
  --purple: #a78bfa;
  --blue: #3b82f6;
  --pink: #ec4899;
  --lime: #84cc16;
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Outfit', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  max-width: 520px;
  margin: 0 auto;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
* { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }

/* ── Header ── */
.header {
  padding: 16px 18px 10px;
  background: linear-gradient(180deg, #161a25 0%, var(--bg) 100%);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 30;
}
.header-row { display: flex; align-items: center; justify-content: space-between; }
.header-left { display: flex; align-items: center; gap: 10px; }
.header-avatar {
  width: 36px; height: 36px; border-radius: 10px;
  background: linear-gradient(135deg, var(--cyan), var(--purple));
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.header-title { font-weight: 700; font-size: 15px; letter-spacing: -0.3px; }
.header-sub {
  font-size: 11px; color: var(--text-d);
  font-family: 'JetBrains Mono', monospace;
}
.online-badge {
  background: rgba(34,211,238,0.1);
  border: 1px solid rgba(34,211,238,0.2);
  border-radius: 6px; padding: 3px 8px;
  font-size: 10px; font-family: 'JetBrains Mono', monospace;
  color: var(--cyan); display: flex; align-items: center; gap: 4px;
}
.dot-live {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--green); box-shadow: 0 0 6px var(--green);
  animation: pulse-dot 2s infinite;
}
@keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:.4} }

/* ── Quick Stats ── */
.stats-row {
  display: flex; gap: 7px; margin-top: 10px;
  overflow-x: auto; padding-bottom: 2px;
  scrollbar-width: none;
}
.stats-row::-webkit-scrollbar { display: none; }
.stat-chip {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px; padding: 5px 10px;
  min-width: 82px; text-align: center; flex: 0 0 auto;
}
.stat-label {
  font-size: 9px; color: var(--text-d);
  text-transform: uppercase; letter-spacing: .5px;
  font-family: 'JetBrains Mono', monospace;
}
.stat-val {
  font-size: 14px; font-weight: 700; margin-top: 1px;
  font-family: 'JetBrains Mono', monospace;
}

/* ── Tabs ── */
.tabs {
  display: flex; overflow-x: auto;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  position: sticky; top: 90px; z-index: 29;
  scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  flex: 0 0 auto;
  padding: 10px 13px;
  background: none; border: none;
  border-bottom: 2px solid transparent;
  color: var(--text-d);
  cursor: pointer; font-family: 'Outfit', sans-serif;
  font-size: 11px; font-weight: 600;
  display: flex; align-items: center; gap: 5px;
  white-space: nowrap; transition: all .2s;
}
.tab:hover { color: var(--text-s); }
.tab.active {
  color: var(--cyan);
  border-bottom-color: var(--cyan);
  background: rgba(34,211,238,0.06);
}
.tab svg { width: 14px; height: 14px; }

/* ── Content ── */
.content { padding: 14px 16px 120px; }
.panel { display: none; flex-direction: column; gap: 14px; }
.panel.active { display: flex; }

/* ── Card ── */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px 16px;
  position: relative; overflow: hidden;
  transition: border-color .2s;
}
.card:hover { border-color: var(--border-a); }
.card-accent {
  position: absolute; top: 0; left: 0;
  width: 3px; height: 100%;
  border-radius: 3px 0 0 3px;
}
.card-title {
  font-size: 13px; font-weight: 700;
  margin-bottom: 10px;
}

/* ── Event Row ── */
.ev-row {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 0;
}
.ev-icon { font-size: 16px; flex-shrink: 0; }
.ev-time {
  font-size: 10px; color: var(--text-d); min-width: 38px;
  font-family: 'JetBrains Mono', monospace;
}
.ev-title { font-size: 12.5px; font-weight: 500; }
.ev-dot {
  margin-left: auto; width: 6px; height: 6px;
  border-radius: 50%; flex-shrink: 0;
}

/* ── Guardia Row ── */
.guardia-row {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 0;
}
.guardia-row + .guardia-row { border-top: 1px solid var(--border); }
.guardia-day {
  width: 40px; text-align: center;
  border-radius: 6px; padding: 4px 0;
  font-size: 10px; font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
}
.guardia-info { flex: 1; }
.guardia-name { font-size: 13px; font-weight: 600; }
.guardia-detail { font-size: 10px; color: var(--text-d); }
.guardia-badge {
  font-size: 9px; font-weight: 700; padding: 2px 6px;
  border-radius: 4px; font-family: 'JetBrains Mono', monospace;
}

/* ── Week Day ── */
.week-day { margin-bottom: 10px; }
.week-day-label {
  font-size: 11px; font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
  margin-bottom: 4px; text-transform: uppercase;
}
.week-item {
  display: flex; align-items: center; gap: 8px;
  padding: 3px 0; font-size: 12px; color: var(--text-s);
}
.week-item-icon { font-size: 13px; }
.week-item-time {
  font-size: 10px; color: var(--text-d); min-width: 36px;
  font-family: 'JetBrains Mono', monospace;
}

/* ── Payment Row ── */
.pay-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 7px 0;
}
.pay-row + .pay-row { border-top: 1px solid var(--border); }
.pay-name { font-size: 12px; font-weight: 500; }
.pay-date { font-size: 10px; color: var(--text-d); }
.pay-amount {
  font-size: 13px; font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
}

/* ── Chat ── */
.chat-wrap {
  display: flex; flex-direction: column;
  height: calc(100vh - 230px);
}
.chat-msgs {
  flex: 1; overflow-y: auto;
  display: flex; flex-direction: column; gap: 10px;
  padding-bottom: 10px;
}
.msg {
  max-width: 85%; padding: 10px 14px;
  font-size: 13px; line-height: 1.5;
  white-space: pre-wrap; word-break: break-word;
}
.msg.user {
  align-self: flex-end;
  background: linear-gradient(135deg, var(--cyan), var(--blue));
  border-radius: 16px 16px 4px 16px;
  color: #fff;
}
.msg.bot {
  align-self: flex-start;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px 16px 16px 4px;
}
.msg-label { font-size: 10px; color: var(--cyan); font-weight: 600; margin-bottom: 4px; }
.chat-input-row {
  display: flex; gap: 8px;
  padding: 10px 0;
  border-top: 1px solid var(--border);
}
.chat-input {
  flex: 1; background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px; padding: 10px 14px;
  color: var(--text); font-size: 13px;
  font-family: 'Outfit', sans-serif; outline: none;
  transition: border-color .2s;
}
.chat-input:focus { border-color: var(--cyan); }
.chat-input::placeholder { color: var(--text-d); }
.chat-send {
  width: 44px; height: 44px; border-radius: 12px;
  background: var(--surface); border: none;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: #fff; transition: all .2s;
}
.chat-send.active { background: linear-gradient(135deg, var(--cyan), var(--blue)); }
.chat-send:disabled { opacity: .5; cursor: default; }

/* ── Dots Loading ── */
.loading-dots { display: flex; gap: 4px; padding: 4px 0; }
.loading-dots span {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--cyan); animation: dot-pulse 1.4s infinite;
}
.loading-dots span:nth-child(2) { animation-delay: .2s; }
.loading-dots span:nth-child(3) { animation-delay: .4s; }
@keyframes dot-pulse { 0%,100%{opacity:.3;transform:scale(1)} 50%{opacity:1;transform:scale(1.2)} }

/* ── Liquidity Big ── */
.liq-big {
  font-size: 32px; font-weight: 800;
  font-family: 'JetBrains Mono', monospace;
  margin-bottom: 12px;
}
.accounts-row { display: flex; gap: 8px; }
.account-chip {
  flex: 1; background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px; padding: 8px 10px; text-align: center;
}
.account-name { font-size: 10px; color: var(--text-d); margin-bottom: 2px; }
.account-val {
  font-size: 14px; font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
}

/* ── Debt Bar ── */
.debt-row { margin-bottom: 10px; }
.debt-header { display: flex; justify-content: space-between; margin-bottom: 3px; }
.debt-name { font-size: 12px; font-weight: 500; }
.debt-total {
  font-size: 12px; font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
}
.debt-bar { height: 8px; background: var(--surface); border-radius: 4px; overflow: hidden; }
.debt-fill { height: 100%; border-radius: 4px; transition: width .8s ease; }
.debt-sub { font-size: 10px; color: var(--text-d); margin-top: 2px; }
.debt-summary {
  margin-top: 8px; padding: 8px 10px;
  background: rgba(239,68,68,.08);
  border: 1px solid rgba(239,68,68,.15);
  border-radius: 8px; font-size: 11px; color: var(--text-s);
}

/* ── Progress Bar ── */
.progress-track { height: 6px; background: var(--surface); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 3px; transition: width .4s; }
.progress-bar-sm { height: 4px; background: var(--surface); border-radius: 2px; overflow: hidden; }
.progress-fill-sm { height: 100%; border-radius: 2px; }

/* ── Objective Row ── */
.obj-row {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 0; cursor: pointer; transition: opacity .2s;
}
.obj-row + .obj-row { border-top: 1px solid var(--border); }
.obj-row.done { opacity: .45; }
.obj-check {
  width: 20px; height: 20px; border-radius: 6px;
  border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all .2s;
}
.obj-check.checked {
  background: var(--green); border-color: var(--green);
}
.obj-check svg { width: 14px; height: 14px; stroke: #fff; stroke-width: 3; fill: none; }
.obj-text { font-size: 12.5px; font-weight: 500; flex: 1; }
.obj-text.crossed { text-decoration: line-through; }
.obj-cat {
  font-size: 9px; color: var(--text-d);
  font-family: 'JetBrains Mono', monospace;
  text-transform: uppercase; margin-top: 1px;
}

/* ── Course Card ── */
.course-item { padding: 10px 0; }
.course-item + .course-item { border-top: 1px solid var(--border); }
.course-top { display: flex; justify-content: space-between; align-items: flex-start; }
.course-name { font-size: 13px; font-weight: 600; margin-bottom: 2px; flex: 1; }
.course-meta {
  font-size: 10px; color: var(--text-d);
  display: flex; gap: 8px;
}
.course-badge {
  font-size: 9px; font-weight: 700; padding: 2px 6px;
  border-radius: 4px; font-family: 'JetBrains Mono', monospace;
  text-transform: uppercase; flex-shrink: 0;
}
.course-progress { margin-top: 6px; }
.course-pct-row { display: flex; justify-content: space-between; margin-bottom: 3px; }
.course-pct-label { font-size: 10px; color: var(--text-d); }
.course-pct-val { font-size: 10px; color: var(--cyan); font-family: 'JetBrains Mono', monospace; }

/* ── Time Suggestion ── */
.time-row { padding: 10px 0; }
.time-row + .time-row { border-top: 1px solid var(--border); }
.time-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.time-icon { font-size: 18px; }
.time-title { font-size: 13px; font-weight: 600; }
.time-tip { font-size: 12px; color: var(--text-s); line-height: 1.5; padding-left: 30px; }

/* ── Distribution bar ── */
.dist-row { margin-bottom: 8px; }
.dist-header { display: flex; justify-content: space-between; margin-bottom: 3px; }
.dist-label { font-size: 12px; }
.dist-val { font-size: 11px; font-family: 'JetBrains Mono', monospace; }
.dist-track { height: 6px; background: var(--surface); border-radius: 3px; overflow: hidden; }
.dist-fill { height: 100%; border-radius: 3px; }

/* ── Purchase Row ── */
.purch-row {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 0;
}
.purch-row + .purch-row { border-top: 1px solid var(--border); }
.purch-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.purch-info { flex: 1; }
.purch-name { font-size: 12.5px; font-weight: 500; }
.purch-meta { font-size: 10px; color: var(--text-d); display: flex; gap: 8px; margin-top: 1px; }
.purch-status {
  font-weight: 600; text-transform: uppercase;
  font-family: 'JetBrains Mono', monospace; font-size: 9px;
}
.purch-price {
  font-size: 13px; font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
}

/* ── Chart bars ── */
.chart-container { display: flex; gap: 8px; justify-content: space-around; }
.chart-col { text-align: center; flex: 1; }
.chart-bars { display: flex; gap: 3px; justify-content: center; align-items: flex-end; height: 80px; margin-bottom: 4px; }
.chart-bar { width: 14px; border-radius: 3px 3px 0 0; }
.chart-label { font-size: 10px; font-weight: 600; color: var(--text-s); }
.chart-net { font-size: 10px; font-weight: 700; margin-top: 2px; font-family: 'JetBrains Mono', monospace; }
.chart-legend { display: flex; justify-content: center; gap: 14px; margin-top: 10px; }
.chart-legend-item { display: flex; align-items: center; gap: 4px; font-size: 10px; color: var(--text-d); }
.chart-legend-dot { width: 8px; height: 8px; border-radius: 2px; }

/* ── Info Box ── */
.info-box {
  margin-top: 10px; padding: 8px 10px;
  border-radius: 8px; font-size: 11px;
}

/* ── Feedback Tags ── */
.tag-row { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.tag {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 6px; padding: 3px 8px;
  font-size: 10px; color: var(--text-s);
}

/* ── Pay Dot ── */
.pay-dot {
  width: 8px; height: 8px; border-radius: 50%;
  flex-shrink: 0; margin-right: 4px; display: inline-block;
}

/* ── Animation ── */
@keyframes fade-in {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.card { animation: fade-in .35s ease both; }
.card:nth-child(2) { animation-delay: .05s; }
.card:nth-child(3) { animation-delay: .1s; }
.card:nth-child(4) { animation-delay: .15s; }
.card:nth-child(5) { animation-delay: .2s; }
</style>
</head>

}

// ── Fetch messages from Telegram ──
async function fetchTgMessages() {
  try {
    const url = TG_API + '/getUpdates?offset=' + (tgOffset ? tgOffset + 1 : -50) + '&limit=50&allowed_updates=["message"]';
    const res = await fetch(url);
    const data = await res.json();
    
    const statusEl = document.getElementById('tgStatus');
    if(statusEl) { statusEl.textContent = '● conectado'; statusEl.style.color = 'var(--green)'; }

    if(data.ok && data.result && data.result.length) {
      const seenIds = new Set(chatMessages.map(m=>m.id));
      for(const up of data.result) {
        tgOffset = Math.max(tgOffset, up.update_id);
        const m = up.message;
        if(!m || !m.text) continue;
        // Detectar chat_id del primer mensaje
        if(!tgChatId && m.chat) tgChatId = m.chat.id;
        if(seenIds.has(m.message_id)) continue;
        
        const isFromBot = m.from && m.from.is_bot;
        const isFromMe = m.from && !m.from.is_bot;
        chatMessages.push({
          id: m.message_id,
          role: isFromMe ? 'user' : 'assistant',
          content: m.text.substring(0, 3000),
          time: new Date(m.date * 1000).toLocaleTimeString('es-ES', { hour:'2-digit', minute:'2-digit' }),
          ts: m.date,
          from: m.from?.first_name || 'Bot'
        });
      }
      // Ordenar por timestamp
      chatMessages.sort((a,b) => (a.ts||0) - (b.ts||0));
      saveChatState();
      renderChatMessages();
    }
  } catch(e) {
    console.error('TG fetch error:', e);
    const statusEl = document.getElementById('tgStatus');
    if(statusEl) { statusEl.textContent = '● error'; statusEl.style.color = 'var(--red)'; }
  }
}

// ── Send message via Telegram ──
async function sendChat() {
  const inp = document.getElementById('chatInput');
  const text = inp.value.trim();
  if(!text || chatLoading) return;
  inp.value = '';
  document.getElementById('chatSend').className = 'chat-send';
  chatLoading = true;

  // Mostrar mensaje enviado inmediatamente
  chatMessages.push({
    role: 'user',
    content: text,
    time: new Date().toLocaleTimeString('es-ES', { hour:'2-digit', minute:'2-digit' }),
    ts: Math.floor(Date.now() / 1000),
    id: 'local-' + Date.now()
  });
  renderChatMessages();

  try {
    // Necesitamos un chat_id. Si no lo tenemos, intentamos obtenerlo
    if(!tgChatId) {
      await fetchTgMessages();
      if(!tgChatId) {
        chatMessages.push({
          role: 'assistant',
          content: '⚠️ No se encontró chat_id. Envía primero un mensaje al bot desde Telegram (@arddiitibot) para activar la conexión.',
          time: new Date().toLocaleTimeString('es-ES', { hour:'2-digit', minute:'2-digit' }),
          ts: Math.floor(Date.now() / 1000),
          id: 'sys-' + Date.now()
        });
        chatLoading = false;
        renderChatMessages();
        return;
      }
    }

    const res = await fetch(TG_API + '/sendMessage', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        chat_id: tgChatId,
        text: text,
        parse_mode: 'Markdown'
      })
    });
    const data = await res.json();
    if(!data.ok) {
      chatMessages.push({
        role: 'assistant',
        content: '⚠️ Error al enviar: ' + (data.description || 'desconocido'),
        time: new Date().toLocaleTimeString('es-ES', { hour:'2-digit', minute:'2-digit' }),
        ts: Math.floor(Date.now() / 1000),
        id: 'err-' + Date.now()
      });
    }
    saveChatState();
    // Poll para ver respuesta del bot
    setTimeout(fetchTgMessages, 2000);
    setTimeout(fetchTgMessages, 5000);
  } catch(e) {
    chatMessages.push({
      role: 'assistant',
      content: '⚠️ Error de conexión con Telegram. Intenta de nuevo.',
      time: new Date().toLocaleTimeString('es-ES', { hour:'2-digit', minute:'2-digit' }),
      ts: Math.floor(Date.now() / 1000),
      id: 'err-' + Date.now()
    });
  }
  chatLoading = false;
  renderChatMessages();
}

    { label:'Ene', income:2200, expenses:2047, net:153 },
    { label:'Feb', income:2200, expenses:1900, net:300 },
    { label:'Mar', income:2200, expenses:2100, net:100 },
  ];
  h += card('📈 Proyección Trimestral', 'var(--blue)', `
    <div class="chart-container">
      ${months.map(m => `
        <div class="chart-col">
          <div class="chart-bars">
            <div class="chart-bar" style="height:${(m.income/2500)*80}px;background:var(--green)"></div>
            <div class="chart-bar" style="height:${(m.expenses/2500)*80}px;background:var(--red);opacity:.7"></div>
          </div>
          <div class="chart-label">${m.label}</div>

      <div class="chart-legend-item"><div class="chart-legend-dot" style="background:var(--green)"></div> Ingresos</div>

// ═══════════════════════════════════════════════════════════
//  GOALS PANEL
// ═══════════════════════════════════════════════════════════
function renderGoals() {
  const el = document.getElementById('panel-goals');
  let h = '';

  // Weekly objectives
  const done = completedCount();
  const total = DATA.objectives.length;
  h += card('🎯 Objetivos de la Semana', 'var(--cyan)', `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
      <div class="progress-track" style="flex:1">
        <div class="progress-fill" style="width:${(done/total)*100}%;background:linear-gradient(90deg,var(--cyan),var(--green))"></div>
      </div>
      <span style="font-size:12px;font-weight:700;color:var(--cyan);font-family:'JetBrains Mono',monospace">${done}/${total}</span>
    </div>
    <div id="objList">
      ${DATA.objectives.map((o,i) => objRow(o,i,'obj')).join('')}
    </div>
  `);

  // Residencia
  h += card('🏥 Tareas Residencia', 'var(--red)', `
    <div id="resList">
      ${DATA.resTasks.map((t,i) => objRow(t,i,'res')).join('')}
    </div>
  `);

  // Feedback
  h += card('📝 Feedback del Día', 'var(--purple)', `
    <div style="font-size:12px;color:var(--text-s);line-height:1.6">
      Hoy es domingo — día de viaje y preparación. Al final del día, LifeBot evaluará:
    </div>
    <div class="tag-row">
      <span class="tag">Productividad</span>
      <span class="tag">Descanso</span>
      <span class="tag">Estudio</span>
      <span class="tag">Admin</span>
    </div>
    <div class="info-box" style="background:rgba(167,139,250,.08);border:1px solid rgba(167,139,250,.15);color:var(--purple)">
      💡 Consejo: Usa el vuelo para revisar el módulo 3 de Cuidados Paliativos (semFYC) — son ~45 min de lectura.
    </div>
  `);

  el.innerHTML = h;
  bindObjectiveClicks();
}

function objRow(o, i, prefix) {
  return `
    <div class="obj-row ${o.done?'done':''}" data-idx="${i}" data-prefix="${prefix}">
      <div class="obj-check ${o.done?'checked':''}">${o.done?checkSVG:''}</div>
      <div style="flex:1">
        <div class="obj-text ${o.done?'crossed':''}">${esc(o.text)}</div>
        ${o.cat ? `<div class="obj-cat">${o.cat}</div>` : ''}
      </div>
    </div>
  `;
}

function bindObjectiveClicks() {
  document.querySelectorAll('.obj-row').forEach(row => {
    row.addEventListener('click', () => {
      const idx = parseInt(row.dataset.idx);
      const prefix = row.dataset.prefix;
      if(prefix==='obj') DATA.objectives[idx].done = !DATA.objectives[idx].done;
      else DATA.resTasks[idx].done = !DATA.resTasks[idx].done;
      renderGoals();
      renderStats();
    });
  });
}

// ═══════════════════════════════════════════════════════════
//  COURSES PANEL
// ═══════════════════════════════════════════════════════════
function renderCourses() {
  const el = document.getElementById('panel-courses');
  const badgeStyle = s => {
    if(s==='active') return 'background:rgba(34,211,238,.1);color:var(--cyan);border:1px solid rgba(34,211,238,.2)';
    if(s==='upcoming') return 'background:rgba(251,191,36,.1);color:var(--amber);border:1px solid rgba(251,191,36,.2)';
    return 'background:rgba(90,95,114,.1);color:var(--text-d);border:1px solid rgba(90,95,114,.2)';
  };
  const badgeLabel = s => s==='active'?'ACTIVO':s==='upcoming'?'PRÓXIMO':'PEND.';
  const barColor = p => p>50?'var(--green)':p>20?'var(--cyan)':'var(--amber)';

  el.innerHTML = card('📚 Cursos de Formación', 'var(--purple)',
    DATA.courses.map(c => `
      <div class="course-item">
        <div class="course-top">
          <div style="flex:1">
            <div class="course-name">${esc(c.name)}</div>
            <div class="course-meta">
              <span>📅 ${c.dates}</span>
              <span>⏱ ${c.hours}</span>
              <span>💰 ${c.price}</span>
            </div>
          </div>
          <span class="course-badge" style="${badgeStyle(c.status)}">${badgeLabel(c.status)}</span>
        </div>
        <div class="course-progress">
          <div class="course-pct-row">
            <span class="course-pct-label">Progreso</span>
            <span class="course-pct-val">${c.progress}%</span>
          </div>
          <div class="progress-bar-sm">
            <div class="progress-fill-sm" style="width:${c.progress}%;background:${barColor(c.progress)}"></div>
          </div>
        </div>
      </div>
    `).join('')
  );
}
