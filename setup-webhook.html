<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LifeBot — Setup Webhook</title>
<style>
body{font-family:system-ui;background:#0d1117;color:#e8ecf4;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;padding:20px}
.box{max-width:500px;background:#111b2b;border-radius:16px;padding:30px;border:1px solid rgba(0,229,255,0.15);text-align:center}
h1{color:#00e5ff;margin-bottom:10px;font-size:1.3rem}
p{color:#8899b8;font-size:.85rem;line-height:1.6;margin-bottom:20px}
button{padding:14px 30px;border-radius:10px;border:none;background:linear-gradient(135deg,#00e5ff,#448aff);color:#000d1a;font-weight:700;font-size:1rem;cursor:pointer;transition:all .2s}
button:hover{transform:scale(1.05);box-shadow:0 0 20px rgba(0,229,255,0.3)}
#result{margin-top:20px;padding:14px;border-radius:10px;font-size:.8rem;font-family:monospace;display:none;word-break:break-all}
.ok{background:rgba(0,230,118,0.1);border:1px solid rgba(0,230,118,0.25);color:#00e676}
.err{background:rgba(255,82,82,0.1);border:1px solid rgba(255,82,82,0.25);color:#ff5252}
.info{color:#4a5e80;font-size:.7rem;margin-top:16px}
</style>
</head>
<body>
<div class="box">
  <h1>🤖 LifeBot — Setup Webhook</h1>
  <p>Haz clic para registrar el webhook de Telegram. Solo necesitas hacerlo <strong>una vez</strong>. Después el bot responderá 24/7 sin necesidad de tener el dashboard abierto.</p>
  <button onclick="setup()">🚀 Registrar Webhook</button>
  <button onclick="remove()" style="background:rgba(255,82,82,0.15);color:#ff5252;margin-left:8px;font-size:.8rem">Desactivar</button>
  <div id="result"></div>
  <p class="info">Webhook URL: <code id="whUrl"></code></p>
</div>
<script>
const TOKEN='8545718889:AAE5gdkbO7iPUfp_M4i8dpoZtAcUBZvjZqo';
const BASE=window.location.origin;
const WH_URL=BASE+'/api/telegram-webhook';
document.getElementById('whUrl').textContent=WH_URL;

async function setup(){
  const res=document.getElementById('result');
  res.style.display='block';res.className='';res.textContent='Registrando...';
  try{
    const r=await fetch(`https://api.telegram.org/bot${TOKEN}/setWebhook`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({url:WH_URL,allowed_updates:['message']})
    });
    const d=await r.json();
    if(d.ok){res.className='ok';res.textContent='✅ Webhook registrado correctamente! El bot ya responde 24/7.'}
    else{res.className='err';res.textContent='❌ Error: '+d.description}
  }catch(e){res.className='err';res.textContent='❌ Error: '+e.message}
}
async function remove(){
  const res=document.getElementById('result');
  res.style.display='block';res.className='';res.textContent='Desactivando...';
  try{
    const r=await fetch(`https://api.telegram.org/bot${TOKEN}/deleteWebhook`);
    const d=await r.json();
    if(d.ok){res.className='ok';res.textContent='✅ Webhook eliminado. El bot ya no responde automáticamente.'}
    else{res.className='err';res.textContent='❌ Error: '+d.description}
  }catch(e){res.className='err';res.textContent='❌ Error: '+e.message}
}
</script>
</body>
</html>
