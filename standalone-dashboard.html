<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARDITI Dashboard + Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; height: 100vh; display: flex; overflow: hidden; }
        .dashboard { flex: 1; padding: 20px; overflow-y: auto; }
        .header { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .stat h4 { font-size: 12px; color: #666; text-transform: uppercase; }
        .stat .value { font-size: 24px; font-weight: bold; color: #333; }
        .chat { width: 400px; background: white; border-left: 1px solid #ddd; display: flex; flex-direction: column; }
        .chat-header { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 15px; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 15px; background: #e5ddd5; }
        .msg { margin-bottom: 10px; padding: 10px; border-radius: 10px; max-width: 80%; }
        .msg.user { background: #dcf8c6; margin-left: auto; }
        .msg.bot { background: white; }
        .msg-header { font-size: 11px; font-weight: bold; margin-bottom: 5px; }
        .msg.user .msg-header { color: #2ecc71; }
        .msg.bot .msg-header { color: #667eea; }
        .chat-input { padding: 15px; background: #f0f0f0; display: flex; gap: 10px; }
        .chat-input input { flex: 1; padding: 10px; border: none; border-radius: 20px; }
        .chat-input button { width: 40px; height: 40px; border: none; border-radius: 50%; background: #667eea; color: white; cursor: pointer; }
        @media (max-width: 768px) { .chat { display: none; } }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="header">
            <h1>🚀 ARDITI Dashboard</h1>
            <p>Carlos Galera · MIR · Conectado</p>
        </div>
        <div class="stats">
            <div class="stat"><h4>Liquidez</h4><div class="value">1.578€</div></div>
            <div class="stat"><h4>Pendientes</h4><div class="value">557€</div></div>
            <div class="stat"><h4>Guardias</h4><div class="value">51</div></div>
            <div class="stat"><h4>Objetivos</h4><div class="value">0/0</div></div>
        </div>
        <div style="background: #fff3cd; padding: 15px; border-radius: 10px; margin-bottom: 15px;">
            <h3>🚨 TAREAS VIP</h3>
            <label><input type="checkbox"> 📹 Ver video Google Antigravity</label><br>
            <label><input type="checkbox"> 📝 Resumir funcionamiento</label><br>
            <label><input type="checkbox"> 🚀 Desplegar plataforma</label>
        </div>
        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;">
            <a href="pisos.html" style="background: white; padding: 15px; border-radius: 10px; text-align: center; text-decoration: none; color: #333;">🏠 Pisos</a>
            <a href="ofertas.html" style="background: white; padding: 15px; border-radius: 10px; text-align: center; text-decoration: none; color: #333;">💼 Ofertas</a>
            <a href="https://wa.me/34679888148" target="_blank" style="background: white; padding: 15px; border-radius: 10px; text-align: center; text-decoration: none; color: #333;">📱 WhatsApp</a>
        </div>
    </div>
    
    <div class="chat">
        <div class="chat-header">
            <h2>💬 Chat WhatsApp</h2>
            <small>● En línea · Sincronizado</small>
        </div>
        <div class="chat-messages" id="messages"></div>
        <div class="chat-input">
            <input type="text" id="input" placeholder="Escribe...">
            <button onclick="send()">➤</button>
        </div>
    </div>

    <script>
        const history = [
            { from: 'user', name: 'Carlos Galera', text: 'Hola me escuchas?' },
            { from: 'bot', name: 'Arditi', text: '¡Hola Carlos! 👋 Sí, te escucho. ¿Qué necesitas?' },
            { from: 'user', name: 'Carlos Galera', text: 'Dime tiempo en Alicante' },
            { from: 'bot', name: 'Arditi', text: '🌤️ Tiempo en Alicante:\n• Nuboso con lluvias\n• 11°C - 16°C\n• Abrigo ligero 🧥' },
            { from: 'user', name: 'Carlos Galera', text: 'conecta con mi repositorio de filehub' },
            { from: 'bot', name: 'Arditi', text: '✅ Plataforma Unificada creada:\n• WhatsApp: ✅\n• Telegram: ✅\n• GitHub Pages: ✅' },
            { from: 'user', name: 'Carlos Galera', text: 'Necesito ver los mensajes en el Dashboard' },
            { from: 'bot', name: 'Arditi', text: '✅ Chat integrado! Ahora puedes ver la conversación aquí.' }
        ];
        
        function render() {
            const container = document.getElementById('messages');
            container.innerHTML = history.map(m => `
                <div class="msg ${m.from}">
                    <div class="msg-header">${m.from === 'user' ? '👨‍⚕️' : '🤖'} ${m.name}</div>
                    <div>${m.text.replace(/\n/g, '<br>')}</div>
                </div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        }
        
        function send() {
            const input = document.getElementById('input');
            if (!input.value.trim()) return;
            history.push({ from: 'user', name: 'Carlos Galera', text: input.value });
            input.value = '';
            render();
            setTimeout(() => {
                history.push({ from: 'bot', name: 'Arditi', text: 'Mensaje recibido. (Demo: En producción esto se sincronizaría con WhatsApp)' });
                render();
            }, 1000);
        }
        
        document.getElementById('input').addEventListener('keypress', e => {
            if (e.key === 'Enter') send();
        });
        
        render();
    </script>
</body>
</html>
